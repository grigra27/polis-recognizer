name: publish

# Triggers on tags matching v0.1.0, v1.2.3, etc. — semver tags only.
# To release:
#   1. Bump version in pyproject.toml + polis_recognizer/__init__.py.
#   2. Update CHANGELOG.md.
#   3. Commit and tag: git tag vX.Y.Z && git push --tags.
#
# Uses PyPI Trusted Publishers (no API token needed). Configure once
# at https://pypi.org/manage/account/publishing/ — point the trusted
# publisher at this repo, this workflow file, and the "publish" job.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/polis-recognizer
    permissions:
      # Trusted Publishing requires this OIDC permission.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
